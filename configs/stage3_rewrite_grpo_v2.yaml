# Stage 3 Rewrite GRPO v2: 增大batch size
# 对比实验：batch_size从1改为2

# The reported run starts from the selected Stage-2 checkpoint saved at this path.
# It is released on HuggingFace under qwen2.5-3b/stage2_for_superrl.
base_model: "models/stage2_for_superrl"
cache_dir: "./hf_cache"

train_data_path: "data/stage3_error_samples.json"
data_format: "error_samples"
max_sequence_length: 2048

task_mode: "concise_rewrite"

training_mode: "grpo"
num_epochs: 5
train_batch_size: 2  # 从1增加到2
gradient_accumulation_steps: 4  # 从8减少到4，有效batch=8
learning_rate: 0.00001
weight_decay: 0.01
max_grad_norm: 1.0

num_samples_per_prompt: 2
ppo_epochs: 4
kl_coef: 0.1
clip_range: 0.2

logging_steps: 5
save_steps: 50
output_dir: "models/stage3_rewrite_v2"
logging_dir: "logs/stage3_rewrite_v2"

use_fp16: true
seed: 42
