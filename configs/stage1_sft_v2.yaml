# Stage 1: SFT with Mask + Shuffle (使用Phase1代码)
# 目标：学习格式和乱序鲁棒性
# 数据范围：前2000条

# 模型配置
model_name: "Qwen/Qwen2.5-3B"
cache_dir: "./hf_cache"

# LoRA配置 (和Phase1一致)
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"

# 数据配置
train_data_path: "data/phase1_unified_clean.jsonl"
max_sequence_length: 2048
start_index: 0
end_index: 2000  # Stage1只用前2000条

# Mask配置 - 和Phase1保持完全一致
# Phase1: 70%样本mask 1步 + 100%shuffle
mask_probability: 0.7  # 70%样本被mask，30%纯shuffle

# 训练参数 (和Phase1一致)
num_epochs: 5
train_batch_size: 2
gradient_accumulation_steps: 16  # Phase1用的16
learning_rate: 0.00005
weight_decay: 0.01
warmup_steps: 80  # Phase1用warmup_steps而非ratio
max_grad_norm: 1.0

# 日志和保存
logging_steps: 10
save_steps: 100
output_dir: "models/stage1"
logging_dir: "logs/stage1"

# 其他
use_fp16: true
seed: 42
